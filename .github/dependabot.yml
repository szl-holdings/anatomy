version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 5
    groups:
      # Group low-risk patch/minor bumps; major bumps arrive as separate PRs.
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
